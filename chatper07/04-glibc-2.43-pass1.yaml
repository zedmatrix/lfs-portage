description: "The main C library provides basic routines for allocating memory, searching directories, opening and closing files, reading and writing files, string handling, pattern matching, arithmetic, and so on."

package:
  name: glibc-pass1
  version: 2.43
  rel: 1
  archive: false
  delete: true
  cflags: " "

sources:
  - url: https://mirror.csclub.uwaterloo.ca/gnu/glibc/glibc-2.43.tar.xz
    sha256: d9c86c6b5dbddb43a3e08270c5844fc5177d19442cf5b8df4be7c07cd5fa3831
    md5: 7ec2588300b299215a65aec7e6afa04f

patches:
  - url: https://www.linuxfromscratch.org/patches/downloads/glibc/glibc-fhs-1.patch
    sha256: 643552db030e2f2d7ffde4f558e0f5f83d3fabf34a2e0e56ebdb49750ac27b0d
    md5: 9a5997c3452909b1769918c759eff8a2
  - url: sources/glibc-macro-guard.patch
    sha256: 60f660347dd72c116391a529a4c18127b8c1a83366ec3e49381f36c0d7be9885
    md5:

prepare: |
  case $(uname -m) in
      i?86)   ln -sfv ld-linux.so.2 $LFS/lib/ld-lsb.so.3
      ;;
      x86_64) ln -sfv ../lib/ld-linux-x86-64.so.2 $LFS/lib64
              ln -sfv ../lib/ld-linux-x86-64.so.2 $LFS/lib64/ld-lsb-x86-64.so.3
      ;;
  esac
  mkdir -v build && cd build;
  echo "rootsbindir=/usr/sbin" > configparms

build: |
  cd build;
  ../configure --prefix=/usr \
               libc_cv_slibdir=/usr/lib \
               --build=$(../scripts/config.guess) \
               --enable-kernel=5.4 \
               --host=$LFS_TGT \
               --disable-nscd &&
  make

install: |
  cd build;
  make DESTDIR=$LFS install;
  sed '/RTLDLIST=/s@/usr@@g' -i $LFS/usr/bin/ldd

requires:
  - binutils-pass1
  - gcc-pass1
  - linux-headers
