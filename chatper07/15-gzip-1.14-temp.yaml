description: "The Gzip package contains programs for compressing and decompressing files."

package:
  name: gzip-temp
  version: 1.14
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://mirror.csclub.uwaterloo.ca/gnu/gzip/gzip-1.14.tar.xz
    sha256: 01a7b881bd220bfdf615f97b8718f80bdfd3f6add385b993dcf6efd14e8c0ac6
    md5: 4bf5a10f287501ee8e8ebe00ef62b2c2

prepare: |
  ./configure --prefix=/usr --host=$LFS_TGT

build: |
  make

install: |
  make DESTDIR=$LFS install

required:
  - grep-temp
