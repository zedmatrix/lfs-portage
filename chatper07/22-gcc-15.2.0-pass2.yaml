description: "The GCC package contains the GNU compiler collection, which includes the C and C++ compilers."

package:
  name: gcc-pass2
  version: 15.2.0
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://mirror.csclub.uwaterloo.ca/gnu/gcc/gcc-15.2.0/gcc-15.2.0.tar.xz
    sha256: 438fd996826b0c82485a29da03a72d71d6e3541a83ec702df4271f6fe025d24e
    md5: b861b092bf1af683c46a8aa2e689a6fd
  - url: https://mirror.csclub.uwaterloo.ca/gnu/mpfr/mpfr-4.2.2.tar.xz
    sha256: b67ba0383ef7e8a8563734e2e889ef5ec3c3b898a01d00fa0a6869ad81c6ce01
    md5: 7c32c39b8b6e3ae85f25156228156061
  - url: https://mirror.csclub.uwaterloo.ca/gnu/mpc/mpc-1.4.0.tar.xz
    sha256: 3210b3a546b1cb00c296ca360891d7740ee6ff06deb02a27a35b20cd3c0bb1a5
    md5:
  - url: https://mirror.csclub.uwaterloo.ca/gnu/gmp/gmp-6.3.0.tar.xz
    sha256: a3c2b80201b89e68616f4ad30bc66aee4927c3ce50e33929ca819d5c43538898
    md5: 956dc04e864001a9c22429f761f2c283

prepare: |
  tar -xf ${YSRC}/mpfr-4.2.2.tar.xz && mv -v mpfr-4.2.2 mpfr &&
  tar -xf ${YSRC}/gmp-6.3.0.tar.xz && mv -v gmp-6.3.0 gmp &&
  tar -xf ${YSRC}/mpc-1.4.0.tar.xz && mv -v mpc-1.4.0 mpc &&
  case $(uname -m) in
    x86_64)
      sed -e '/m64=/s/lib64/lib/' -i.orig gcc/config/i386/t-linux64
    ;;
  esac
  sed '/thread_header =/s/@.*@/gthr-posix.h/' -i libgcc/Makefile.in libstdc++-v3/include/Makefile.in

build: |
  mkdir -v build && cd build;
  ../configure --prefix=/usr \
               --host=$LFS_TGT \
               --target=$LFS_TGT \
               --build=$(../config.guess) \
               --with-build-sysroot=$LFS \
               --enable-default-pie \
               --enable-default-ssp \
               --disable-nls \
               --disable-multilib \
               --disable-libatomic \
               --disable-libgomp \
               --disable-libquadmath \
               --disable-libsanitizer \
               --disable-libssp \
               --disable-libvtv \
               --enable-languages=c,c++ \
               LDFLAGS_FOR_TARGET=-L$PWD/$LFS_TGT/libgcc &&
  make

install: |
  cd build && make DESTDIR=$LFS install;
  ln -sv gcc $LFS/usr/bin/cc

required:
  - xz-temp
  - gcc-pass1
  - binutils-pass2
  - glibc-pass1
  - linux-headers
