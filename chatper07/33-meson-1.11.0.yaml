description: "Meson is an open source build system designed to be both extremely fast and as user friendly as possible. "

package:
  name: meson-temp
  version: 1.11.0
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://github.com/mesonbuild/meson/releases/download/1.11.0/meson-1.11.0.tar.gz
    sha256:
    md5: 6166c98e71b2525622d32078d970e66c

build: |
  pip3 wheel -w dist --no-cache-dir --no-build-isolation --no-deps $PWD

install: |
  pip3 install --no-index --find-links dist meson

final: |
  install -vDm644 data/shell-completions/bash/meson /usr/share/bash-completion/completions/meson &&
  install -vDm644 data/shell-completions/zsh/_meson /usr/share/zsh/site-functions/_meson

required:
  - python-temp
