description: "The Binutils package contains a linker, an assembler, and other tools for handling object files."

package:
  name: binutils-pass2
  version: 2.46.0
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://sourceware.org/pub/binutils/releases/binutils-2.46.0.tar.xz
    sha256: d75a94f4d73e7a4086f7513e67e439e8fcdcbb726ffe63f4661744e6256b2cf2
    md5: 81bb6810bcd1119819dc0804956e1c92

prepare: |
  sed '6031s/$add_dir//' -i ltmain.sh;
  mkdir -v build && cd build;
  ../configure --prefix=/usr \
               --host=$LFS_TGT \
               --build=$(../config.guess) \
               --disable-werror \
               --disable-nls \
               --enable-shared \
               --enable-gprofng=no \
               --enable-64-bit-bfd \
               --enable-new-dtags \
               --enable-default-hash-style=gnu

build: |
  cd build && make

install: |
  cd build && make DESTDIR=$LFS install;
  rm -v $LFS/usr/lib/lib{bfd,ctf,ctf-nobfd,opcodes,sframe}.{a,la}

required:
  - xz-temp
  - gcc-pass1
  - binutils-pass1
  - glibc-pass1
  - linux-headers
