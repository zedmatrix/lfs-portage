description: "File package contains a utility for determining the type of a given file or files."

package:
  name: file-temp
  version: 5.47
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://astron.com/pub/file/file-5.47.tar.gz
    sha256: 45672fec165cb4cc1358a2d76b5d57d22876dcb97ab169427ac385cbe1d5597a
    md5:

prepare: |
  mkdir build && pushd build
    ../configure --disable-bzlib --disable-libseccomp \
                 --disable-xzlib --disable-zlib
    make
  popd

build: |
  ./configure --prefix=/usr \
              --host=$LFS_TGT \
              --build=$(./config.guess) &&
  make FILE_COMPILE=$(pwd)/build/src/file

install: |
  make DESTDIR=$LFS install
  rm -v $LFS/usr/lib/libmagic.la

required:
  - diffutils-temp
