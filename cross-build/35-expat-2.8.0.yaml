description: "The Expat package contains a stream oriented C library for parsing XML."

package:
  name: expat-temp
  version: 2.8.0
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://github.com/libexpat/libexpat/releases/download/R_2_8_0/expat-2.8.0.tar.xz
    sha256: a37bfae0aa9775bd8521ebd85dc456d486f0ff31138f6c91fd902ea732624542
    md5:

prepare: |
  ./configure --prefix=/usr --disable-static --docdir=/usr/share/doc/expat-${PKGVER}

build: |
  make

check: |
  make check

install: |
  make install;
  install -v -m644 doc/*.{html,css} /usr/share/doc/expat-${PKGVER}
