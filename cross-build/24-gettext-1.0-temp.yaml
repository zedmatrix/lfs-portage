description: "The Gettext package contains utilities for internationalization and localization."

package:
  name: gettext-temp
  version: 1.0
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://mirror.csclub.uwaterloo.ca/gnu/gettext/gettext-1.0.tar.xz
    sha256: 71132a3fb71e68245b8f2ac4e9e97137d3e5c02f415636eb508ae607bc01add7
    md5:

prepare: |
  ./configure --disable-shared

build: |
  make

install: |
  cp -v gettext-tools/src/{msgfmt,msgmerge,xgettext} /usr/bin
