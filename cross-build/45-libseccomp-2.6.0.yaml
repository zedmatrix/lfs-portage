description: "Provides an easy to use and platform independent interface to the Linux kernel's syscall filtering mechanism."

package:
  name: libseccomp
  version: 2.6.0
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://github.com/seccomp/libseccomp/releases/download/v2.6.0/libseccomp-2.6.0.tar.gz
    sha256: 83b6085232d1588c379dc9b9cae47bb37407cf262e6e74993c61ba72d2a784dc
    md5: 2d42bcde31fd6e994fcf251a1f71d487

prepare: |
  ./configure --prefix=/usr --disable-static

build: |
  make

install: |
  make install

optional:
  - which
  - valgrind
  - cython
