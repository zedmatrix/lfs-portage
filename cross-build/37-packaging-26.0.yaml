description: "The packaging module is a Python library that provides utilities that implement the interoperability specifications which have clearly one correct behaviour (PEP440) "

package:
  name: packaging
  version: 26.0
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://files.pythonhosted.org/packages/source/p/packaging/packaging-26.0.tar.gz
    sha256: 00243ae351a257117b6a241061796684b084ed1c516a08c48a3f7e147a9d80b4
    md5:

build: |
  pip3 wheel -w dist --no-cache-dir --no-build-isolation --no-deps $PWD

install: |
  pip3 install --no-index --find-links dist packaging

required:
  - flit-core
  - python-temp
