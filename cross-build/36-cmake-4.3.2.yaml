description: "The CMake package contains a modern toolset used for generating Makefiles. It is a successor of the auto-generated configure script and aims to be platform- and compiler-independent. A significant user of CMake is KDE since version 4."

package:
  name: cmake
  version: 4.3.2
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://cmake.org/files/v4.3/cmake-4.3.2.tar.gz
    sha256: b0231eb39b3c3cabdc568c619df78208a7bd95ea10c9b2236d61218bac1b367d
    md5:

prepare: |
  sed -i '/"lib64"/s/64//' Modules/GNUInstallDirs.cmake;
  ./bootstrap --prefix=/usr --system-libarchive --system-expat --system-zlib --system-bzip2 \
     --system-liblzma --no-system-libs --mandir=/share/man --docdir=/share/doc/cmake-${PKGVER}

build: |
  make

install: |
  make install
