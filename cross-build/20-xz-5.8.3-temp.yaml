description: "It provides capabilities for the lzma and the newer xz compression formats."

package:
  name: xz-temp
  version: 5.8.3
  rel: 1
  archive: false
  delete: true

sources:
  - url: https://github.com//tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.xz
    sha256: fff1ffcf2b0da84d308a14de513a1aa23d4e9aa3464d17e64b9714bfdd0bbfb6
    md5:

prepare: |
  ./configure --prefix=/usr \
              --host=$LFS_TGT \
              --disable-static \
              --build=$(build-aux/config.guess) \
              --docdir=/usr/share/doc/xz-${PKGVER}

build: |
  make

install: |
  make DESTDIR=$LFS install;
  rm -v $LFS/usr/lib/liblzma.la

required:
  - tar-temp
